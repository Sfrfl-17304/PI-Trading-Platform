networks:
  crypto-net:
    driver: bridge

services:
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    environment:
      # Configuration KRaft
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Identifiant unique du cluster (généré automatiquement si absent)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "9094:9094"
    networks:
      - crypto-net

  market-data-service:
    build: ./market-data-service
    container_name: market-data-service
    depends_on:
      - kafka
      - influxdb
    ports:
      - "8083:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: my-super-secret-token
      INFLUX_ORG: my-org
      INFLUX_BUCKET: crypto-bucket
    networks:
      - crypto-net

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: my-org
      DOCKER_INFLUXDB_INIT_BUCKET: crypto-bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - crypto-net

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: crypto
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - crypto-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - crypto-net

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/crypto
      DB_USERNAME: user
      DB_PASSWORD: password
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: change-me-please-change-me-please-change-me-please
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - kafka
    networks:
      - crypto-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/crypto
      DB_USERNAME: user
      DB_PASSWORD: password
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: change-me-please-change-me-please-change-me-please
      USER_SERVICE_URL: http://user-service:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - crypto-net

  historical-service:
    build: ./historical-service
    container_name: historical-service
    ports:
      - "8087:8087"
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: my-super-secret-token
      INFLUX_ORG: my-org
      INFLUX_BUCKET: crypto-bucket
      INFLUX_MEASUREMENT: price_ticks
    depends_on:
      - influxdb
    networks:
      - crypto-net

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8084:8084"
    depends_on:
      - kafka
      - redis
    networks:
      - crypto-net

  python-model-api:
    build:
      context: ./python-model-api
    container_name: python-model-api
    ports:
      - "5000:5000"
    networks:
      - crypto-net

  prediction-service:
    build:
      context: ./prediction-service
    container_name: prediction-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PYTHON_API_URL: http://python-model-api:5000/predict
      HISTORICAL_SERVICE_URL: http://historical-service:8087
    ports:
      - "8085:8085"
    depends_on:
      - kafka
      - python-model-api
      - historical-service
    networks:
      - crypto-net

volumes:
  influxdb-data:
  postgres-data:
